name: Backend Workflow

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]
    workflow_dispatch: # adds a manual "Run workflow" button to your GitHub repository webpage
jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            # Set up Node.js on the GitHub runner 
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "16"
                  cache: "npm"
                  cache-dependency-path: ./frontend/package-lock.json

            # Install dependencies on the GitHub runner 
            - name: Install Backend dependencies
              run: |
                  cd backend
                  npm ci

            # Run Backend tests on the GitHub runner 
            - name: Run Backend tests
              run: |
                  cd backend
                  npm run test

            # Run Backend linting on the GitHub runner
            - name: Run Backend linting
              run: |
                  cd backend
                  npm run lint

    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Login to DockerHub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Build and push Backend image
              uses: docker/build-push-action@v4
              with:
                  context: ./backend
                  push: true
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/backend-vacation:latest
                      ${{ secrets.DOCKER_USERNAME }}/backend-vacation:${{ github.sha }}
